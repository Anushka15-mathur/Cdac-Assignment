<html>
    <head>
        <title>SignIn Page</title>
        <link rel="stylesheet" type="text/css" href="style.css" >
    </head>
    <body>
        <div id="container">
            <div id="section-1">
             <div id="head-1">
                <h1>Sign In</h1>
             </div> 
             <div id="logo">
              <img src="./mypic1.png">
              <img src="./mypic3.png">
              <img src="./mypic2.png">
             </div>
             <div id="mis-1">
                <p>Or Sign in using E Mail Address</p>
             </div>
             <form>
                 <div class="input-form">
                     <input type="email" placeholder="Email">
                 </div>
                 <div class="input-form">
                     <input type="password" placeholder="Password">
                 </div>
                 <div id="mis-2">
                     <a href="#">Forgot your password?</a>
                 </div>
                 <div id="button-1">
                      <button type="submit">Sign In</button>
                 </div>
                 </form>
            </div>
            <div id="section-2">
             <div id="head-2">
                <h1>Create,</h1>
                <h1>Account!</h1>
                <p>Sign up if you don't have an account...</p>
             </div>
             <div id="button-2">
                  <button type="button">Sign Up</button>
             </div>
            </div>
        </div>
    </body>
</html>
