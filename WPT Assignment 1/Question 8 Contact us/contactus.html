<html>
    <head>
        <title>Contact Us</title>
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body>
        <div id="container">
           <div id="section-1">
              <div id="headline-1">
                <h1>Get in touch</h1>
              </div>
            <div id="details">
                <div class="detail-box">
                    <img src="./name.png">
                    <div class="text">
                        <span>Name</span>
                        <p>HTML CSS Tutorial</p>
                    </div> 
                </div>
                <div class="detail-box">
                    <img src="./message.png">
                    <div class="text">
                         <span>Email</span>
                         <p>htmlcss3tutorial@gmail.com</p>
                    </div>
                </div>
                <div class="detail-box">
                    <img src="./phone.png">
                    <div class="text">
                        <span>Phone</span>
                        <p>+91 1234567890</p>
                    </div>
                </div>
                <div class="detail-box">
                    <img src="./location.png">
                    <div class="text">
                        <span>Address</span>
                        <p>123 Street, Block-4, Navi Mumbai, India</p>
                    </div>  
                </div>
            </div>
            <div id="logo">
                <img src="./mypic1.png">
                <img src="./mypic2.png">
                <img src="./mypic3.png">
                <img src="./mypic4.png">
            </div>
           </div>
           <div id="section-2">
              <div id="headline-2">
                <h1>Contact Us</h1>
              </div>
              <div id="form-details">
                <form>
                    <div class="input">
                        <input type="text" placeholder="Full Name">
                    </div>
                    <div class="input">
                        <input type="email" placeholder="Email">
                    </div>
                    <div class="input">
                        <input type="text" placeholder="Website">
                    </div>
                    <div class="input">
                        <input type="number" placeholder="Contact Number">
                    </div>
                    <div class="input">
                        <textarea placeholder="Message"></textarea>
                    </div>
                    <div id="button">
                        <button type="submit">Submit</button>
                    </div>
                </form>
              </div>
           </div>
        </div>
    </body>
</html>
